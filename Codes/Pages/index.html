
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forensic Medical Department - Management System</title>
  <meta http-equiv="refresh" content="0; url=patients.html" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Inter", "Segoe UI", sans-serif; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fbff;
      color: #071842;
    }
    .redirect-box {
      text-align: center;
      background: white;
      border: 1px solid #dce5f4;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(15, 35, 75, .06);
      padding: 40px 48px;
    }
    .redirect-box h1 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #082b75;
    }
    .redirect-box p {
      color: #596985;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .redirect-box a {
      color: #1263e6;
      font-weight: 700;
      text-decoration: none;
    }
    .redirect-box a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="redirect-box">
    <h1>Forensic Medical Department</h1>
    <p>Redirecting to Patient / Victim Management...</p>
    <a href="patients.html">Click here if you are not redirected automatically</a>
